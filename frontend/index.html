<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title id="page-title">BABURU KINKO</title>
    <meta
      id="page-description"
      name="description"
      content=""
    />
    <link rel="icon" type="image/jpeg" href="./logo.jpg" />
    <link rel="apple-touch-icon" href="./logo.jpg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700&family=M+PLUS+Rounded+1c:wght@700;800&family=Noto+Sans+SC:wght@400;500;600;700;800&family=Nunito:wght@500;600;700;800&family=ZCOOL+KuaiLe&family=ZCOOL+QingKe+HuangYou&family=ZCOOL+XiaoWei&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="floating-toast" id="floating-toast" hidden>
      <span class="floating-toast-text" id="floating-toast-text"></span>
    </div>
    <div class="scene-backdrop" aria-hidden="true">
      <div class="aurora aurora-peach"></div>
      <div class="aurora aurora-mint"></div>
      <div class="aurora aurora-lilac"></div>
      <div class="bubble-field" id="bubble-field"></div>
      <div class="grid-haze"></div>
    </div>

    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">
          <img class="brand-logo" src="./logo.jpg" alt="BABURU KINKO logo" />
        </div>
        <div>
          <h1>BABURU KINKO</h1>
        </div>
      </div>

      <nav class="nav-pills" aria-label="">
        <button class="nav-pill active" data-target="#overview" data-i18n="navOverview"></button>
        <button class="nav-pill" data-target="#borrow" data-i18n="navBorrow"></button>
        <button class="nav-pill" data-target="#loans" data-i18n="navLoans"></button>
        <button class="nav-pill" data-target="#faq" data-i18n="navHelp"></button>
      </nav>

      <div class="topbar-actions">
        <button class="primary-button" id="wallet-button" data-i18n="connectWallet"></button>
        <button class="ghost-button" id="lang-toggle" type="button"></button>
      </div>
    </header>

    <section class="top-status-banner">
      <span class="banner-charm" aria-hidden="true">🍬</span>
      <div class="banner-copy">
        <strong data-i18n="loanOpen"></strong>
        <p id="banner-line">
          <span data-i18n="bannerPrefix"></span>
          <a id="banner-buy-link" href="#" target="_blank" rel="noreferrer noopener">$BABURU</a>
          <span data-i18n="bannerSuffix"></span>
        </p>
      </div>
      <span class="banner-sparkle" aria-hidden="true">✦</span>
      <button class="banner-close" id="banner-close-button" type="button" aria-label="" onclick="window.dismissTopBanner?.()">×</button>
    </section>

    <main>
      <section class="hero section reveal" id="overview">
        <div class="hero-copy">
          <div class="hero-copy-shell">
            <div class="hero-atmosphere" aria-hidden="true">
              <div class="hero-stage-glow hero-stage-glow-peach"></div>
              <div class="hero-stage-glow hero-stage-glow-mint"></div>
              <div class="hero-stage-bubble hero-stage-bubble-large"></div>
              <div class="hero-stage-bubble hero-stage-bubble-small"></div>
              <div class="hero-stage-sparkle hero-stage-sparkle-a">✦</div>
              <div class="hero-stage-sparkle hero-stage-sparkle-b">✦</div>
            </div>
            <p class="hero-badge" data-i18n="heroBadge">
              <img class="hero-badge-logo" src="./logo.jpg" alt="" aria-hidden="true" />
            </p>
            <h2 data-i18n="heroTitle"></h2>
            <p class="hero-description" data-i18n="heroDescription"></p>
          </div>

          <div class="hero-actions">
            <a class="primary-button" href="#borrow" data-i18n="startEstimate"></a>
            <a class="secondary-button" href="#loans" data-i18n="viewLoans"></a>
          </div>

          <div class="debug-strip" id="debug-strip" hidden>
            <span class="debug-chip" id="debug-chain">Chain --</span>
            <span class="debug-chip" id="debug-wallet">Wallet --</span>
            <span class="debug-chip" id="debug-account">Account --</span>
          </div>

        </div>
      </section>

      <section class="dashboard section reveal">
        <div class="section-heading">
          <div>
            <h3 data-i18n="overviewTitle"></h3>
          </div>
        </div>

        <div class="metrics-grid">
          <article class="metric-card metric-card-large metric-card-reserve tilt-card">
            <div class="metric-ornament metric-ornament-bubbles" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
            </div>
            <span class="metric-kicker" data-i18n="metricToyReserve"></span>
            <strong id="reserve-metric">--</strong>
            <div class="metric-stack-inline metric-stack-inline-wide metric-stack-inline-reserve">
              <div class="metric-stack-row">
                <span data-i18n="metricReserveTotal"></span>
                <strong id="reserve-total-metric">--</strong>
              </div>
            </div>
          </article>
          <article class="metric-card metric-card-limit tilt-card">
            <div class="metric-ornament metric-ornament-arc" aria-hidden="true">
              <span></span>
            </div>
            <span class="metric-kicker" data-i18n="metricSlippageNote"></span>
            <strong id="single-loan-ratio-metric">--</strong>
          </article>
          <article class="metric-card metric-card-guests tilt-card">
            <div class="metric-ornament metric-ornament-guests" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
              <span></span>
            </div>
            <span class="metric-kicker" data-i18n="metricExposureNote"></span>
            <strong id="active-loans-metric">--</strong>
          </article>
          <article class="metric-card metric-card-heat tilt-card">
            <div class="metric-ornament metric-ornament-sprinkles" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
              <span></span>
            </div>
            <div class="metric-card-actions">
              <button class="ghost-button small metric-action-button" id="public-liquidation-button" type="button" data-i18n="publicLiquidation"></button>
            </div>
            <span class="metric-kicker metric-kicker-with-logo">
              <img class="metric-kicker-logo" src="./logo.jpg" alt="" aria-hidden="true" />
              <span data-i18n="metricMarketNote"></span>
            </span>
            <strong id="price-metric">TBA</strong>
            <div class="metric-stack-inline metric-stack-inline-wide">
              <div class="metric-stack-row">
                <span data-i18n="metricActiveCollateral"></span>
                <strong id="active-collateral-metric">--</strong>
              </div>
              <div class="metric-stack-row">
                <span data-i18n="metricPendingLiquidation"></span>
                <strong id="liquidatable-collateral-metric">--</strong>
              </div>
            </div>
          </article>
        </div>
      </section>

      <section class="timeline section reveal">
        <div class="section-heading">
          <div>
            <h3 data-i18n="timelineTitle"></h3>
            <p class="section-note" data-i18n="timelineSubtitle"></p>
          </div>
        </div>

        <div class="timeline-ribbon timeline-ribbon-quad">
          <article class="timeline-step">
            <span class="timeline-badge" data-i18n="timelineDayEarly"></span>
            <strong data-i18n="timelineEarly6030"></strong>
            <p class="timeline-note" data-i18n="timelineEarlySteps"></p>
          </article>
          <article class="timeline-step timeline-step-highlight">
            <span class="timeline-badge" data-i18n="timelineDayNormal"></span>
            <strong data-i18n="timelineNormal"></strong>
            <p class="timeline-note timeline-note-highlight" data-i18n="timelineNormalNote"></p>
          </article>
          <article class="timeline-step timeline-step-danger">
            <span class="timeline-badge" data-i18n="timelineDayGrace"></span>
            <strong data-i18n="timelineGrace"></strong>
            <p class="timeline-note" data-i18n="timelineGraceSteps"></p>
          </article>
          <article class="timeline-step timeline-step-overdue">
            <span class="timeline-badge" data-i18n="timelineDayOverdue"></span>
            <strong data-i18n="timelineOverdue"></strong>
            <p class="timeline-note" data-i18n="timelineOverdueNote"></p>
          </article>
        </div>
      </section>

      <section class="borrow-lab section reveal" id="borrow">
        <div class="section-heading">
          <div>
            <h3 data-i18n="borrowTitle"></h3>
          </div>
        </div>

        <div class="borrow-grid">
          <article class="console-panel tilt-card">
            <div class="borrow-machine-top">
              <ol class="flow-steps flow-steps-panel" aria-label="">
                <li class="flow-step active">
                  <span class="flow-step-index">01</span>
                  <span class="flow-step-label" data-i18n="tabEstimate"></span>
                </li>
                <li class="flow-step">
                  <span class="flow-step-index">02</span>
                  <span class="flow-step-label" data-i18n="tabApprove"></span>
                </li>
                <li class="flow-step">
                  <span class="flow-step-index">03</span>
                  <span class="flow-step-label" data-i18n="tabConfirmLoan"></span>
                </li>
              </ol>

              <div class="borrow-footnote borrow-footnote-inline">
                <span data-i18n="windowBody"></span>
              </div>
            </div>

            <div class="borrow-machine-body">
              <div class="borrow-inputs">
                <label class="field">
                  <span class="field-head">
                    <span data-i18n="stakeAmount"></span>
                    <button class="ghost-button small" id="max-stake-button" type="button">MAX</button>
                  </span>
                  <div class="field-shell">
                    <input id="stake-input" type="range" min="10000" max="5000000" step="0.0001" value="1000000" />
                    <div class="range-meta">
                      <strong id="stake-display">-- BABURU</strong>
                      <small id="wallet-available" data-i18n="connectWallet"></small>
                    </div>
                  </div>
                </label>

                <label class="field">
                  <span data-i18n="minBorrowRatio"></span>
                  <div class="field-shell">
                    <input id="ratio-input" type="range" min="1" max="10000" step="1" value="9500" />
                    <div class="range-meta">
                      <strong id="ratio-display">95.00%</strong>
                      <small id="ratio-note" data-i18n="ratioNote"></small>
                    </div>
                  </div>
                </label>
              </div>

              <div class="borrow-summary">
                <div class="estimate-inline">
                  <div class="estimate-head">
                    <p class="estimate-eyebrow" data-i18n="estimatedBorrow"></p>
                    <div class="borrow-refresh-meta" id="borrow-refresh-meta" hidden>
                      <span class="borrow-refresh-ring" aria-hidden="true">
                        <span class="borrow-refresh-ring-inner"></span>
                      </span>
                      <span class="borrow-refresh-copy" id="borrow-refresh-copy"></span>
                    </div>
                  </div>
                  <div class="result-number"><span id="borrow-estimate">--</span> <em>BNB</em></div>
                </div>

                <div class="result-breakdown">
                  <div>
                    <span data-i18n="refBorrowLabel"></span>
                    <strong id="ref-borrow">-- BNB</strong>
                  </div>
                  <div>
                    <span data-i18n="protectedFloor"></span>
                    <strong id="min-borrow">-- BNB</strong>
                  </div>
                </div>

                <div class="borrow-machine-actions">
                  <div class="cta-row">
                    <button class="primary-button large" id="borrow-action-button" type="button" data-i18n="approveAndBorrow"></button>
                  </div>
                </div>
              </div>
            </div>
          </article>
        </div>
      </section>

      <section class="loans section reveal" id="loans">
        <div class="section-heading">
          <div>
            <h3 data-i18n="loansTitle"></h3>
          </div>
        </div>
        <div class="loan-toolbar">
          <div class="filter-row">
            <button class="filter-chip active" data-filter="all" data-i18n="filterAll"></button>
            <button class="filter-chip" data-filter="early" data-i18n="filterEarly"></button>
            <button class="filter-chip" data-filter="normal" data-i18n="filterNormal"></button>
            <button class="filter-chip" data-filter="grace" data-i18n="filterGrace"></button>
            <button class="filter-chip" data-filter="pending" data-i18n="filterPending"></button>
          </div>
          <button class="ghost-button small select-all-button" id="select-all-orders" type="button" data-i18n="selectAllOrders"></button>
        </div>

        <div class="loan-list" id="loan-list">
          <article class="loan-empty-state">
            <strong data-i18n="walletLoansTitle"></strong>
          </article>
        </div>

        <aside class="repay-bar tilt-card is-collapsed" id="repay-bar" aria-hidden="true">
          <div>
            <strong id="repay-summary"></strong>
            <small id="repay-penalty"></small>
          </div>
          <div class="cta-row">
            <button class="primary-button" id="confirm-repayment-button" type="button" data-i18n="confirmRepayment"></button>
          </div>
        </aside>
      </section>

      <section class="faq section reveal" id="faq">
        <div class="section-heading">
          <div>
            <h3 data-i18n="faqTitle"></h3>
          </div>
        </div>

        <div class="faq-list">
          <details open>
            <summary data-i18n="faq1Q"></summary>
            <p data-i18n="faq1A"></p>
          </details>
          <details>
            <summary data-i18n="faqBaburuQ"></summary>
            <p data-i18n="faqBaburuA"></p>
          </details>
          <details>
            <summary data-i18n="faqTaxQ"></summary>
            <p data-i18n="faqTaxA"></p>
          </details>
          <details>
            <summary data-i18n="faqBorrowCapQ"></summary>
            <p data-i18n="faqBorrowCapA"></p>
          </details>
          <details>
            <summary data-i18n="faq3Q"></summary>
            <p data-i18n="faq3A"></p>
          </details>
          <details>
            <summary data-i18n="faq2Q"></summary>
            <p data-i18n="faq2A"></p>
          </details>
          <details>
            <summary data-i18n="faqFeeQ"></summary>
            <p data-i18n="faqFeeA"></p>
          </details>
          <details>
            <summary data-i18n="faqMultiLoanQ"></summary>
            <p data-i18n="faqMultiLoanA"></p>
          </details>
          <details>
            <summary data-i18n="faqPauseQ"></summary>
            <p data-i18n="faqPauseA"></p>
          </details>
          <details>
            <summary data-i18n="faq4Q"></summary>
            <p data-i18n="faq4A"></p>
          </details>
          <details>
            <summary data-i18n="faqLiquidationQ"></summary>
            <p data-i18n="faqLiquidationA"></p>
          </details>
          <details>
            <summary data-i18n="faqBlacklistQ"></summary>
            <p data-i18n="faqBlacklistA"></p>
            <ul class="address-list">
              <li data-i18n="blacklistLp"></li>
              <li data-i18n="blacklistCustody"></li>
              <li data-i18n="blacklistDead"></li>
            </ul>
          </details>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p>NAMAZU LABS@2026</p>
    </footer>

    <div class="mobile-dock">
      <a href="#overview" data-i18n="navOverview"></a>
      <a href="#borrow" data-i18n="tabEstimate"></a>
      <a href="#loans" data-i18n="mobileOrders"></a>
      <a href="#faq" data-i18n="navHelp"></a>
    </div>

    <script src="./config.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
